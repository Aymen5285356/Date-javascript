<!DOCTYPE html>
<html>
<head>
    <title>Nombre de jours</title>
</head>
<body>

    <label>Donner votre date de naissance :</label>
    <input type="date" id="date">
    <button onclick="afficher()">Afficher</button>

    <script>
        function afficher() {
            let date = document.getElementById("date").value;

            if (date === "") {
                alert("Veuillez saisir une date !");
                return;
            }

            let mois = new Date(date).getMonth() + 1;
            let annee = new Date(date).getFullYear();

            let jours;

            if (mois == 1 || mois == 3 || mois == 5 || mois == 7 || mois == 8 || mois == 10 || mois == 12) {
                jours = 31;
            } else if (mois == 4 || mois == 6 || mois == 9 || mois == 11) {
                jours = 30;
            } else {
                // Février
                if ((annee % 4 == 0 && annee % 100 != 0) || (annee % 400 == 0)) {
                    jours = 29;
                } else {
                    jours = 28;
                }
            }

            alert("Nombre de jours: " + jours);
        }
    </script>

</body>
</html>
