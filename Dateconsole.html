<html>
<head> <title> Exemple de Date </title>
<body>Objet de type de Date...</body>
</head>
<script>
let fd = new Date();
	console.log(fd.getFullYear());
	console.log(fd.getMonth());
	console.log(fd.getDate());
	console.log(fd.getHours());
	console.log(fd.getMinutes());
	console.log(fd.getSeconds());
	console.log(fd.getMilliseconds());
	console.log(fd.getTime());
	console.log(fd);
</script>
</html>
